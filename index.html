<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>熊谷社中お稽古前チェック</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/src/style.css">
</head>
<body>
    <div id="app">
        <div id="login-screen">
            <div class="login-box glass-panel">
                <h2>社中会員専用</h2>
                <p>パスワードを入力してください</p>
                <input type="password" id="password-input" placeholder="パスワード">
                <button id="login-btn" class="primary-btn">ログイン</button>
                <p id="login-error" style="color: #ff6b6b; margin-top: 1rem; display: none;">パスワードが正しくありません</p>
            </div>
        </div>
        <div class="overlay"></div>
        <header>
            <h1>熊谷社中お稽古前チェック</h1>
            <nav>
                <button id="btn-etiquette" class="nav-btn active">作法の確認</button>
                <button id="btn-quiz" class="nav-btn">家元クイズ</button>
                <button id="btn-mei" class="nav-btn">茶杓の銘</button>
                <button id="btn-schedule" class="nav-btn">お稽古日</button>
            </nav>
        </header>

        <main id="game-container">
            <!-- Game content will be injected here -->
            <div id="game-content" class="glass-panel">
                <div id="start-screen">
                    <h2>裏千家へようこそ</h2>
                    <p>茶杓（ちゃしゃく）は、抹茶をすくうための大切な道具です。<br>清める所作と、それを作った家元（お作）について学びましょう。</p>
                    <button id="start-game" class="primary-btn">始める</button>
                </div>
            </div>
        </main>

        <footer>
            <p>&copy; 2026 茶道初心者学習アプリ</p>
        </footer>
    </div>
    <script type="module" src="/src/main.js"></script>
</body>
</html>
